# 分支名
main:
  push:
    - services:
        - docker
      docker:
        image: docker.cnb.cool/elsejj/ci/py312-rust:latest
      runner:
        tags: cnb:arch:amd64
        cpus: 16
      volumes:
        - ./target
      env:
        RUSTFLAGS: "-C target-feature=+sse4.2 -C target-feature=+avx2 -C target-feature=+pclmulqdq"
      stages:
        - name: extract version
          script: grep -o '^version = "[0-9.]*"' Cargo.toml | sed 's/version = "//' | sed 's/"$//'
          exports:
            info: MSD_VERSION
        - name: build
          script: make release
        - name: set docker tag
          script: echo -n "${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest"
          exports:
            info: IMAGE_TAG
        - name: build docker image
          script: docker build -t $IMAGE_TAG .
        - name: push docker image
          script: docker push $IMAGE_TAG
        - name: push python binding
          script:
            - export TWINE_USERNAME="cnb"
            - export TWINE_PASSWORD=$CNB_TOKEN
            - export TWINE_REPOSITORY_URL="https://pypi.cnb.cool/elsejj/pymsd/-/packages/simple"
            - twine upload target/wheels/pymsd-${MSD_VERSION}-*.whl